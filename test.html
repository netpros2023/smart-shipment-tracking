<!doctype html>
<html>
  <head>
    <title>Live Shipment Tracking</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }

      #map {
        height: 500px;
        width: 100%;
        margin-top: 20px;
      }

      #updates {
        margin-top: 20px;
        background: #f5f5f5;
        padding: 10px;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <h2>🚚 Live Shipment Tracking</h2>

    <h3>Status Updates</h3>

    <div id="updates"></div>

    <div id="map"></div>

    <script>
      const socket = io("http://localhost:5000");

      /* =============================
   MAP INITIALIZATION
============================= */

      const map = L.map("map").setView([11.0168, 76.9558], 7);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
      }).addTo(map);

      const marker = L.marker([11.0168, 76.9558]).addTo(map);

      /* =============================
   SHIPMENT STATUS UPDATES
============================= */

      socket.on("shipmentUpdated", (data) => {
        document.getElementById("updates").innerHTML +=
          "<p><b>" + data.tracking_id + "</b> → " + data.status + "</p>";
      });

      /* =============================
   LIVE LOCATION TRACKING
============================= */

      socket.on("locationUpdate", (data) => {
        console.log("Location Update:", data);

        marker.setLatLng([data.latitude, data.longitude]);

        map.panTo([data.latitude, data.longitude]);
      });
    </script>
  </body>
</html>
